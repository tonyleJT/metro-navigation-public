name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Show Ruff version
        run: ruff --version

      - name: Show Ruff configuration
        run: ruff config
        
      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy opencv-python-headless torch pytest ruff
          python -m pip install --editable . --no-deps
      - name: Check formatting
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
